[project]
name = "asset-pipeline"
version = "0.1.0"
description = "Dreamer's asset pipeline: manifest-driven 2D asset generation, post-processing, and verification"
requires-python = ">=3.11"
dependencies = ["Pillow>=10"]

[project.optional-dependencies]
# `live` pulls the OpenAI SDK for scripts/smoke_live.py only. Kept out of the
# gate (which stays offline) so verification is dependency-light.
live = ["openai>=1.0"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
