# Dreamer is a uv workspace (monorepo). This root is a *virtual* workspace root:
# it ships no product code itself — product packages live under packages/<name>/,
# each with its own pyproject, tests, and README. The first member is the asset
# pipeline; the Python orchestrator (Stage 2, see README §Stack) joins later as a
# second member. tools/check.sh is the workspace-wide gate.
[tool.uv.workspace]
members = ["packages/*"]

# Workspace-wide dev tooling, shared by every member. `uv sync` installs it by default.
[dependency-groups]
dev = ["pytest>=8"]
